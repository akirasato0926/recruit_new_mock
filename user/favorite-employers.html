<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>お気に入り（官公庁・自治体） | パブリックコネクト</title><style id="thd-css">
.thd{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e7ebe9;}
.thd-top{max-width:1416px;margin:0 auto;display:flex;align-items:center;gap:28px;padding:14px 60px;}

.thd-login{font-size:14px;font-weight:700;color:#333;white-space:nowrap;}
.thd-login:hover{color:#115A36;text-decoration:underline;}
.thd-register{display:inline-flex;align-items:center;gap:8px;background:#115A36;color:#fff;font-size:14px;font-weight:700;padding:10px 22px;border-radius:8px;white-space:nowrap;box-shadow:0 2px 8px rgba(17,90,54,.30);}
.thd-register:hover{background:#0c472a;}
.thd-register svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.2;}
.thd-navrow{border-top:1px solid #eef1f0;}
.thd-nav{max-width:1416px;margin:0 auto;display:flex;align-items:center;gap:34px;padding:0 60px;height:56px;}
.thd-nav .nav-link{font-size:14px;font-weight:700;color:#333;height:100%;display:flex;align-items:center;border-bottom:3px solid transparent;}
.thd-nav .nav-link:hover{color:#115A36;}
.thd-nav .nav-link.active{color:#115A36;border-bottom-color:#115A36;}
.thd-nav .nav-link.media .ext{width:13px;height:13px;margin-left:5px;stroke:currentColor;fill:none;stroke-width:2;}
.thd-search{margin-left:auto;display:flex;align-items:center;gap:9px;width:300px;height:40px;padding:0 14px;border:1px solid #d8dcde;border-radius:999px;background:#f5f7f6;}
.thd-search svg{width:17px;height:17px;stroke:#767676;fill:none;stroke-width:2;}
.thd-search input{flex:1;min-width:0;border:none;background:transparent;outline:none;font-size:14px;font-family:inherit;}
@media(max-width:980px){.thd-top{padding:12px 20px;gap:14px;}.thd-uacts{gap:16px;}.thd-nav{padding:0 20px;gap:18px;overflow-x:auto;}.thd-search{display:none;}}
</style><style id="user-css">
:root{--g:#115A36;--gd:#0c472a;--g50:#e6f5ec;}
*{box-sizing:border-box;}
body{margin:0;font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;color:#333;background:#fff;line-height:1.7;}

img{max-width:100%;display:block;}

.tabs{display:flex;gap:28px;border-bottom:1px solid #e7ebe9;margin:14px 0 0;}
.tabs .t{font-size:15px;font-weight:700;color:#999;padding:14px 2px;border-bottom:3px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.tabs .t.on{color:#222;border-bottom-color:var(--g);}
.prow{display:flex;gap:24px;padding:18px 0;border-bottom:1px solid #eef1f0;font-size:14px;}
.prow .k{width:140px;color:#555;font-weight:700;flex:none;}
.pphoto{width:96px;height:120px;border-radius:8px;background:#eef1f0;object-fit:cover;}
/* メッセージ一覧 */
.msg-layout{display:grid;grid-template-columns:220px 1fr;gap:28px;margin-top:8px;}

.msg-side h3{font-size:13px;color:#888;margin:0 0 10px;font-weight:700;}
.msg-side label{display:flex;align-items:center;gap:8px;font-size:14px;color:#444;margin:0 0 10px;cursor:pointer;}
.msg-side .grp{margin:0 0 22px;}
.msg-listbox{border:1px solid #e7ebe9;border-radius:10px;min-height:420px;}
.msg-listbox .hd{display:flex;justify-content:flex-end;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid #eef1f0;font-size:13px;color:#555;}

.md-card{display:grid;grid-template-columns:300px 1fr;gap:24px;border:1px solid #e7ebe9;border-radius:12px;padding:24px;margin:14px 0 22px;}

.md-gov{display:flex;flex-direction:column;gap:8px;}
.md-gov .av{width:48px;height:48px;border-radius:50%;background:#dfeee8;display:flex;align-items:center;justify-content:center;color:var(--g);font-weight:700;}
.md-gov .nm{font-size:18px;font-weight:700;}
.md-gov .loc{font-size:13px;color:#777;}
.md-gov .lbl{font-size:12px;color:#888;margin-top:8px;}
.md-gov a.lnk{color:var(--g);font-weight:700;font-size:14px;}
.md-memo label{font-size:12px;color:#888;}
.md-memo textarea{width:100%;height:120px;border:1px solid #d8dcde;border-radius:8px;padding:10px;font-family:inherit;font-size:14px;margin-top:6px;}
.md-compose{border:1px solid #e7ebe9;border-radius:12px;padding:20px;margin:14px 0 26px;}
.md-compose .to{font-size:14px;margin:0 0 12px;}.md-compose .to b{margin-left:10px;}
.md-compose input,.md-compose textarea{width:100%;border:1px solid #d8dcde;border-radius:8px;padding:12px 14px;font-family:inherit;font-size:14px;margin:0 0 12px;}
.md-compose textarea{height:90px;}
.md-compose .row{display:flex;align-items:center;justify-content:space-between;}
.md-compose .att{color:var(--g);font-size:13px;font-weight:700;}
.md-send{display:inline-flex;align-items:center;gap:6px;background:#cdd5d1;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:not-allowed;}
.md-disabled{font-size:12px;color:#b00;margin:8px 0 0;}
.thread{border:1px solid #e7ebe9;border-radius:12px;padding:22px;}
.thread .who{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;}
.thread .who .av{width:34px;height:34px;border-radius:50%;background:#dfeee8;}
.thread .dt{font-size:12px;color:#999;font-weight:400;margin-left:4px;}
.thread .subj{font-size:15px;font-weight:700;margin:12px 0 8px;}
.thread .box{border:1px solid #e7ebe9;border-radius:8px;padding:16px;font-size:14px;color:#444;}
.thread .box a{color:var(--g);font-weight:700;}
.thread .box .btn{display:inline-block;margin-top:12px;border:1px solid var(--g);color:var(--g);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;}
/* お知らせ */
.noti-head{display:flex;align-items:center;gap:12px;margin:24px 0 18px;}
.noti-head .ic{width:44px;height:44px;border-radius:50%;background:var(--g50);display:flex;align-items:center;justify-content:center;}
.noti-head .ic svg{width:24px;height:24px;stroke:var(--g);fill:none;stroke-width:1.8;}
.noti-head h1{font-size:24px;font-weight:700;margin:0;}
.noti-row{display:flex;align-items:center;gap:14px;padding:20px 6px;border-bottom:1px solid #eef1f0;}
.noti-row .bd{flex:1;}
.noti-row .ti{font-size:15px;font-weight:700;line-height:1.5;}
.noti-row .mt{font-size:12px;color:#999;margin-top:6px;display:flex;align-items:center;gap:10px;}
.noti-row .new{color:#e2622f;font-weight:700;}
.noti-row .chev{color:#bbb;font-size:20px;}
/* 検索バー(トップ) */
.usearch{display:flex;gap:14px;align-items:flex-end;background:#fff;border:1px solid #e7ebe9;border-radius:12px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.05);flex-wrap:wrap;}
.usearch .fld{flex:1;min-width:160px;}
.usearch .fld label{display:block;font-size:13px;font-weight:700;margin:0 0 6px;}
.usearch .fld select{width:100%;height:44px;border:1px solid #d8dcde;border-radius:8px;padding:0 12px;font-size:14px;font-family:inherit;}
.usearch .go{height:44px;border:none;background:var(--g);color:#fff;font-weight:700;padding:0 32px;border-radius:8px;cursor:pointer;font-size:15px;}
.uhero{background:linear-gradient(135deg,#1f7a4d,#115A36);color:#fff;border-radius:14px;padding:34px;margin:18px 0;}
.uhero h1{font-size:22px;margin:0 0 6px;}.uhero p{margin:0;opacity:.95;font-size:14px;}
.fav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}

.fav-card{border:1px solid #e7ebe9;border-radius:12px;padding:20px;display:flex;align-items:center;gap:12px;}
.fav-card:hover{box-shadow:0 6px 18px rgba(17,90,54,.1);}
.fav-card img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1px solid #eee;}
.fav-card .nm{font-size:15px;font-weight:700;}
.secttl{display:flex;align-items:center;justify-content:space-between;margin:34px 0 16px;}
.secttl h2{font-size:18px;font-weight:700;margin:0;}
.secttl a{font-size:13px;color:var(--g);font-weight:700;}
/* ステップインジケーター(エントリー/退会フロー) */
.usteps{display:flex;align-items:center;justify-content:center;gap:0;margin:24px auto 8px;max-width:560px;}
.usteps .st{display:flex;flex-direction:column;align-items:center;gap:6px;flex:none;}

.usteps .st .lb{font-size:12px;color:#888;font-weight:700;}
.usteps .st.on .nu{background:var(--g);color:#fff;}

.usteps .st.done .nu{background:var(--g50);color:var(--g);}
.usteps .ln{flex:1;height:2px;background:#e7ebe9;margin:0 8px;align-self:flex-start;margin-top:15px;min-width:30px;}
.usteps .ln.done{background:var(--g);}
/* 確認表示(read-only) */
.uconf{max-width:620px;margin:22px auto 0;border:1px solid #e7ebe9;border-radius:12px;overflow:hidden;}
.uconf .row{display:flex;gap:16px;padding:16px 20px;border-bottom:1px solid #eef1f0;font-size:14px;}
.uconf .row:last-child{border-bottom:none;}
.uconf .k{width:140px;color:#555;font-weight:700;flex:none;}
.uconf .v{flex:1;min-width:0;white-space:pre-wrap;}
.uactrow{display:flex;gap:14px;justify-content:center;max-width:620px;margin:22px auto 0;}
@media(max-width:560px){.uactrow{flex-direction:column;}}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;border:1px solid #cdd5d1;border-radius:8px;padding:13px 26px;font-size:15px;font-weight:700;color:#333;background:#fff;cursor:pointer;font-family:inherit;}
.btn-ghost:hover{border-color:var(--g);color:var(--g);}
.btn-prim{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:8px;padding:13px 32px;font-size:15px;font-weight:700;color:#fff;background:var(--g);cursor:pointer;font-family:inherit;}
.btn-prim:hover{background:var(--gd);}
/* 完了画面 */
.udone{max-width:560px;margin:40px auto;text-align:center;}
.udone .ic{width:72px;height:72px;border-radius:50%;background:var(--g50);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.udone .ic svg{width:38px;height:38px;stroke:var(--g);fill:none;stroke-width:2.4;}
.udone h1{font-size:22px;margin:0 0 12px;}
.udone p{color:#555;font-size:14px;margin:0 0 24px;}
/* 応募状況 */
.appcard{display:block;border:1px solid #e7ebe9;border-radius:12px;padding:20px;margin:0 0 14px;}
.appcard:hover{box-shadow:0 6px 18px rgba(17,90,54,.1);}
.appcard .top{display:flex;align-items:center;gap:12px;margin:0 0 8px;}
.appcard .org{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:#444;}
.appcard .org img{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid #eee;}
.appcard .ti{font-size:16px;font-weight:700;line-height:1.5;margin:0 0 10px;}
.stbadge{display:inline-block;font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px;margin-left:auto;flex:none;}
.stbadge.screening{background:#fff4e5;color:#b26a00;}
.stbadge.interview{background:#e6f5ec;color:#115a36;}
.stbadge.offer{background:var(--g50);color:var(--g);}
.appcard .meta{font-size:12px;color:#999;}
/* 選考タイムライン */
.atl{list-style:none;padding:0;margin:18px 0 0;}
.atl li{position:relative;padding:0 0 26px 30px;}
.atl li::before{content:"";position:absolute;left:7px;top:3px;bottom:-3px;width:2px;background:#e7ebe9;}
.atl li:last-child::before{display:none;}
.atl li .dot{position:absolute;left:0;top:1px;width:16px;height:16px;border-radius:50%;background:#e7ebe9;border:3px solid #fff;box-shadow:0 0 0 1px #e7ebe9;}
.atl li.done .dot{background:var(--g);box-shadow:0 0 0 1px var(--g);}
.atl li.cur .dot{background:var(--g);box-shadow:0 0 0 3px var(--g50),0 0 0 4px var(--g);}
.atl li .st{font-size:14px;font-weight:700;}
.atl li .dt{font-size:12px;color:#999;margin-top:2px;}
.atl li.todo .st{color:#aaa;}
/* ===== レスポンシブ(タブレット/スマホ) PCは不変 ===== */
@media(max-width:1024px) and (min-width:641px){
  .fav-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:640px){
  .uw{padding:0 16px;}
  h1.uh{font-size:20px;}
  .mp-head{flex-direction:column;align-items:flex-start;gap:14px;}
  .mp-actions{grid-template-columns:1fr;}
  .prow{flex-direction:column;gap:4px;} .prow .k{width:auto;}
  .utabs{gap:16px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;}

  .uconf .row{flex-direction:column;gap:4px;} .uconf .k{width:auto;}
  .uactrow{flex-direction:column;} .uactrow .btn-ghost,.uactrow .btn-prim{width:100%;}

  .fav-grid{grid-template-columns:1fr;}
  .usetbox{max-width:100%;}
  .appcard .top{flex-wrap:wrap;} .stbadge{margin-left:0;}
}

<script id="resp-hdr-js">
(function(){
  function ready(fn){ if(document.readyState!=='loading'){fn();} else {document.addEventListener('DOMContentLoaded',fn);} }
  function txt(el){ return (el.textContent||'').replace(/\s+/g,' ').trim(); }
  function build(){
    var thd=document.querySelector('.thd'); if(!thd) return;
    var top=thd.querySelector('.thd-top'); if(!top) return;
    var burger=top.querySelector('.thd-burger');
    if(!burger){ burger=document.createElement('button'); burger.type='button'; burger.className='thd-burger';
      burger.setAttribute('aria-label','メニューを開く'); burger.innerHTML='<span></span>'; top.appendChild(burger); }
    var dr=document.getElementById('thd-drawer');
    if(!dr){ dr=document.createElement('div'); dr.id='thd-drawer'; dr.className='thd-drawer'; document.body.appendChild(dr); }
    // ナビ
    var navLinks=Array.prototype.slice.call(thd.querySelectorAll('.thd-nav .nav-link'));
    var navHtml=navLinks.map(function(a){
      var tg=a.getAttribute('target'); return '<a href="'+a.getAttribute('href')+'"'+(tg?' target="'+tg+'" rel="noopener"':'')+'>'+txt(a)+'</a>';
    }).join('');
    // アカウント
    var acctHtml='', logout=false;
    var uacts=thd.querySelector('.thd-uacts');
    if(uacts){
      // .thd-uacts の直下を順に走査。マイページ(.thd-my)はアコーディオンに、それ以外はフラットリンク。
      Array.prototype.slice.call(uacts.children).forEach(function(ch){
        if(ch.classList && ch.classList.contains('thd-my')){
          var btn=ch.querySelector('.thd-my-btn');
          var bc=btn?btn.cloneNode(true):null; if(bc){var s=bc.querySelector('svg');if(s)s.parentNode.removeChild(s);}
          var label=bc?txt(bc):'マイページ';
          var subs='';
          Array.prototype.slice.call(ch.querySelectorAll('.thd-my-menu a')).forEach(function(a){
            if(a.classList.contains('thd-logout')) return;
            subs+='<a href="'+(a.getAttribute('href')||'#')+'">'+txt(a)+'</a>';
          });
          acctHtml+='<div class="dacc"><button type="button" class="dacc-btn">'+label+'<span class="cv"></span></button><div class="dacc-sub">'+subs+'</div></div>';
        } else if(ch.tagName==='A'){
          var h=ch.getAttribute('href')||'#';
          var c=ch.cloneNode(true); var b=c.querySelector('.nbadge'); if(b)b.parentNode.removeChild(b);
          var t=txt(c); if(!t)return;
          acctHtml+='<a href="'+h+'">'+t+'</a>';
        }
      });
      logout=true;
    } else {
      var act=thd.querySelector('.thd-actions');
      if(act){ var reg=act.querySelector('.thd-register'), login=act.querySelector('.thd-login');
        if(reg) acctHtml+='<a class="cta" href="'+reg.getAttribute('href')+'">会員登録</a>';
        if(login) acctHtml+='<a class="cta out" href="'+login.getAttribute('href')+'">ログイン</a>';
      }
    }
    var html='<div class="ov"></div><div class="panel"><div class="dh"><span class="ttl">MENU</span>'
      +'<button type="button" class="dclose" aria-label="閉じる">×</button></div>';
    if(navHtml) html+='<div class="grp">'+navHtml+'</div>';
    if(acctHtml) html+='<div class="grp">'+acctHtml+(logout?'<a href="#" class="lo">ログアウト</a>':'')+'</div>';
    html+='</div>';
    dr.innerHTML=html;
    function close(){ dr.classList.remove('open'); document.body.style.overflow=''; }
    burger.onclick=function(){ dr.classList.add('open'); document.body.style.overflow='hidden'; };
    dr.querySelector('.ov').onclick=close;
    dr.querySelector('.dclose').onclick=close;
    var lo=dr.querySelector('.lo'); if(lo) lo.onclick=function(e){ e.preventDefault(); try{localStorage.removeItem('pcmember');}catch(x){} location.href='index-2.html'; };
    // マイページ アコーディオン開閉
    Array.prototype.slice.call(dr.querySelectorAll('.dacc-btn')).forEach(function(b){
      b.onclick=function(){ b.parentNode.classList.toggle('open'); };
    });
  }
  ready(function(){ build(); setTimeout(build,120); setTimeout(build,360); });
})();
</script></body></html>
